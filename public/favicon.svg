<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="rounded">
      <rect width="32" height="32" rx="6"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Portuguese flag diagonal split: green (left) and red (right) -->
    <polygon points="0,0 32,0 0,32" fill="#006B3F"/>
    <polygon points="32,0 32,32 0,32" fill="#C62D2D"/>
  </g>
  <!-- M monogram -->
  <text x="16" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="0.5">M</text>
  <!-- MARIATTA text -->
  <text x="16" y="29" font-family="Georgia, 'Times New Roman', serif" font-size="4" text-anchor="middle" fill="rgba(255,255,255,0.85)" letter-spacing="1.5">MARIATTA</text>
</svg>